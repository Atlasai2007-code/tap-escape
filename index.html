<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tap Escape" />
  <meta name="theme-color" content="#060816" />
  <title>Tap Escape</title>
  <style>
    :root {
      --bg: #060816;
      --bg2: #0b1430;
      --panel: rgba(10, 16, 35, 0.74);
      --line: rgba(255,255,255,0.08);
      --text: #eef5ff;
      --muted: #9ba9c8;
      --cyan: #57f0ff;
      --pink: #ff63cb;
      --violet: #8f7cff;
      --gold: #ffd86a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; min-height: 100dvh; overflow: hidden; overscroll-behavior: none; background: #060816; }
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at top, rgba(87,240,255,0.12), transparent 22%),
        radial-gradient(circle at bottom, rgba(10,18,40,0.35), transparent 34%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      -webkit-overflow-scrolling: auto;
    }

    .app {
      position: fixed;
      inset: 0;
      width: min(100%, 480px);
      height: 100dvh;
      margin: 0 auto;
      padding: calc(8px + var(--safe-top)) calc(8px + var(--safe-right)) calc(4px + var(--safe-bottom)) calc(8px + var(--safe-left));
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      background: transparent;
    }

    .card {
      background: rgba(10, 16, 35, 0.44);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
      backdrop-filter: blur(14px);
    }

    .hud {
      display: none;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.28rem;
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .scores {
      text-align: right;
    }

    .scores .big {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .scores .small {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .arena-wrap {
      touch-action: none;
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.04);
      background: linear-gradient(180deg, rgba(10,18,40,0.96), rgba(5,8,18,0.96));
      flex: 1;
      min-height: 0;
      box-shadow: 0 18px 40px rgba(0,0,0,0.26);
    }

    .arena-wrap.menu-mode canvas,
    .arena-wrap.menu-mode .top-ui {
      opacity: 0;
      pointer-events: none;
    }

    .arena-wrap.game-enter {
      animation: gameReveal 520ms cubic-bezier(.2,.8,.2,1);
      transform-origin: center center;
    }

    .arena-wrap canvas,
    .arena-wrap .top-ui {
      transition: opacity 180ms ease;
    }

    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 9 / 16;
      display: block;
      touch-action: none;
    }

    .top-ui {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      pointer-events: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
    }

    .multiplier-top {
      position: absolute;
      left: 50%;
      top: calc(50% + 2px);
      transform: translate(-50%, -50%);
      min-width: 82px;
      text-align: center;
      font-weight: 900;
      font-size: 1.82rem;
      line-height: 1;
      letter-spacing: -0.05em;
      color: #adb8d2;
      text-shadow: 0 0 14px rgba(173,184,210,0.12);
      transition: color 180ms ease, text-shadow 180ms ease, transform 180ms ease, opacity 180ms ease, box-shadow 180ms ease, background 180ms ease;
      pointer-events: none;
      border-radius: 999px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .multiplier-top::after {
      content: '';
      position: absolute;
      inset: -9px;
      border-radius: 999px;
      border: 2px solid var(--tutorial-ring-border, rgba(255,255,255,0));
      opacity: var(--tutorial-ring-opacity, 0);
      transform: scale(var(--tutorial-ring-scale, 0.92));
      pointer-events: none;
    }


    .arena-best {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 4;
      color: rgba(255,255,255,0.52);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 0 14px rgba(0,0,0,0.18);
    }

    .arena-best strong {
      color: rgba(255,255,255,0.9);
      font-weight: 900;
    }

    .score-pill, .threat-pill {
      background: transparent;
      border: 0;
      backdrop-filter: none;
      border-radius: 0;
      padding: 0;
      pointer-events: auto;
      box-shadow: none;
    }

    .score-pill .label, .threat-pill .label {
      display: block;
      color: var(--muted);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .score-pill .value {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .score-pill .best-mini {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .threat-pill .value {
      font-size: 0.88rem;
      font-weight: 800;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      min-width: 38px;
      min-height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.05);
      color: #ffffff;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 0;
      appearance: none;
      -webkit-appearance: none;
      flex: 0 0 38px;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      display: block;
      fill: #ffffff !important;
      stroke: none;
      pointer-events: none;
      margin: 0 auto;
      flex: 0 0 auto;
    }

    #muteBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #muteBtn svg {
      width: 23px;
      height: 23px;
      display: block;
      margin: 0;
      transform: translate(-0.75px, 0);
      transform-origin: center;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(20px + var(--safe-top)) calc(18px + var(--safe-right)) calc(24px + var(--safe-bottom)) calc(18px + var(--safe-left));
      background:
        radial-gradient(circle at top, rgba(87,240,255,0.10), transparent 24%),
        radial-gradient(circle at bottom, rgba(255,99,203,0.10), transparent 26%),
        linear-gradient(180deg, rgba(3, 6, 14, 0.99), rgba(3, 6, 14, 0.96));
      z-index: 20;
      animation: overlayFade 320ms ease;
      transition: background 180ms ease, opacity 220ms ease;
    }

    .overlay.revealing {
      background:
        radial-gradient(circle at top, rgba(87,240,255,0.02), transparent 24%),
        radial-gradient(circle at bottom, rgba(255,99,203,0.02), transparent 26%),
        linear-gradient(180deg, rgba(3, 6, 14, 0.12), rgba(3, 6, 14, 0.06));
    }

    .overlay.hidden { display: none; }

    .tutorial-cue {
      position: absolute;
      left: 50%;
      top: 18%;
      transform: translateX(-50%) translateY(8px);
      z-index: 9;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(9, 14, 29, 0.78);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
      white-space: nowrap;
    }

    .tutorial-cue.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }


    .tutorial-cue.pop-out {
      opacity: 0 !important;
      transform: translateX(-50%) translateY(-18px) scale(1.22) !important;
      transition: opacity 260ms ease, transform 260ms cubic-bezier(.2,.8,.2,1) !important;
      filter: blur(0.4px);
    }


    .tutorial-cue.dashboard-point {
      top: 58px;
    }

    .tutorial-cue.dashboard-point::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      width: 2px;
      height: 24px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.92));
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .tutorial-cue.dashboard-point::before {
      content: '';
      position: absolute;
      left: 50%;
      bottom: calc(100% + 28px);
      width: 10px;
      height: 10px;
      border-left: 2px solid rgba(255,255,255,0.92);
      border-top: 2px solid rgba(255,255,255,0.92);
      transform: translateX(-50%) rotate(45deg);
    }

    .tutorial-target {
      position: absolute;
      width: 92px;
      height: 92px;
      margin-left: -46px;
      margin-top: -46px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 0 0 0 rgba(255,255,255,0.0), 0 0 30px rgba(87,240,255,0.24);
      pointer-events: none;
      opacity: 0;
      z-index: 8;
      transition: opacity 180ms ease;
      animation: tutorialTargetPulse 720ms ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 1.08rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      text-shadow: 0 0 12px rgba(255,255,255,0.24);
    }

    .tutorial-target span {
      animation: tutorialTapFlash 560ms ease-in-out infinite;
    }

    .tutorial-target.show {
      opacity: 1;
    }


    .resume-countdown {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) scale(0.82);
      z-index: 10;
      min-width: 64px;
      color: #ffffff;
      font-size: 3.9rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      text-align: center;
      line-height: 1;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
      text-shadow: 0 0 18px rgba(255,255,255,0.22), 0 0 40px rgba(143,124,255,0.22), 0 0 60px rgba(87,240,255,0.14);
      will-change: transform, opacity;
    }

    .resume-countdown.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    @keyframes tutorialTargetPulse {
      0%, 100% { transform: scale(0.92); box-shadow: 0 0 0 0 rgba(255,255,255,0.0), 0 0 22px rgba(87,240,255,0.18); }
      50% { transform: scale(1.08); box-shadow: 0 0 0 14px rgba(255,255,255,0.08), 0 0 34px rgba(87,240,255,0.28); }
    }

    @keyframes tutorialTapFlash {
      0%, 100% { opacity: 0.45; transform: scale(0.94); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    .panel {
      width: min(90%, 360px);
      text-align: center;
      background: rgba(9, 14, 29, 0.82);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 22px;
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .panel h2 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
    }

    .panel p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .big-score {
      margin-top: 10px;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .panel-meta {
      display: flex;
      justify-content: center;
      gap: 18px;
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      min-height: 54px;
      border: 0;
      border-radius: 18px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform 120ms ease, filter 140ms ease;
    }

    .btn:active {
      transform: scale(0.97);
      filter: brightness(1.04);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      color: #08111f;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .controls, .touch-pill, .footnote {
      display: none;
    }

    .home-shell {
      width: min(100%, 420px);
      min-height: calc(100vh - var(--safe-top) - var(--safe-bottom) - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px 8px;
      text-align: center;
    }

    .home-shell.drop-all .home-title,
    .home-shell.drop-all .home-sub,
    .home-shell.drop-all .play-hero,
    .home-shell.drop-all .best-line {
      animation: homeDrop 300ms cubic-bezier(.22,.8,.3,1) forwards;
    }

    .home-title {
      font-size: clamp(2.1rem, 6vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.06em;
      margin: 0;
    }

    .home-sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
      max-width: 30ch;
    }

    .home-orb {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff 0%, #57f0ff 25%, #ff63cb 72%, rgba(255,99,203,0.08) 100%);
      box-shadow: 0 0 0 10px rgba(87,240,255,0.05), 0 0 40px rgba(143,124,255,0.22), 0 0 80px rgba(87,240,255,0.14);
      animation: orbPulse 2.4s ease-in-out infinite;
    }

    .home-orb.drop {
      animation: orbDrop 360ms cubic-bezier(.22,.78,.22,1) forwards;
      will-change: transform, opacity;
    }

    .transition-orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff 0%, #57f0ff 25%, #8f7cff 65%, rgba(255,99,203,0.15) 100%);
      box-shadow: 0 0 0 10px rgba(87,240,255,0.05), 0 0 40px rgba(143,124,255,0.22), 0 0 80px rgba(87,240,255,0.14);
      pointer-events: none;
      z-index: 40;
      will-change: transform, top, left, width, height, opacity, box-shadow, filter;
    }

    .arena-wrap.menu-mode.revealing canvas,
    .arena-wrap.menu-mode.revealing .top-ui {
      opacity: 1;
      pointer-events: none;
    }

    .play-hero {
      width: 150px;
      height: 38px;
      min-height: 0;
      padding: 0 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, #57f0ff, #8f7cff 55%, #ff63cb);
      color: #07101b;
      font-size: 0.95rem;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(87,240,255,0.14), 0 6px 14px rgba(255,99,203,0.12);
    }

    .best-line {
      color: var(--muted);
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .best-line strong {
      color: var(--text);
      font-size: 1.18em;
      font-weight: 900;
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 10px rgba(87,240,255,0.05), 0 0 40px rgba(143,124,255,0.22), 0 0 80px rgba(87,240,255,0.14); }
      50% { transform: scale(1.04); box-shadow: 0 0 0 14px rgba(87,240,255,0.06), 0 0 54px rgba(143,124,255,0.28), 0 0 96px rgba(255,99,203,0.16); }
    }

    @keyframes overlayFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes orbDrop {
      0% { transform: translate3d(0, 0, 0) scale(1); opacity: 1; }
      12% { transform: translate3d(0, -10px, 0) scale(1.01); opacity: 1; }
      100% { transform: translate3d(0, 360px, 0) scale(0.72); opacity: 0; }
    }

    @keyframes homeDrop {
      0% { transform: translate3d(0, 0, 0); opacity: 1; }
      16% { transform: translate3d(0, -10px, 0); opacity: 1; }
      100% { transform: translate3d(0, 420px, 0); opacity: 0; }
    }

    @keyframes gameReveal {
      0% { opacity: 0; transform: scale(0.94) translateY(18px); filter: blur(8px); }
      60% { opacity: 1; transform: scale(1.01) translateY(0); filter: blur(0); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card hud">
      <div class="brand">
        <h1>Tap Escape</h1>
        <p>Dash before the walls close in.</p>
      </div>
      <div class="scores">
        <div class="big" id="hudScore">0</div>
        <div class="small">Best <span id="hudBest">0</span></div>
      </div>
    </div>

    <div class="top-ui">
      <div style="display:flex; align-items:center; gap:12px; width:100%; justify-content:space-between;">
        <div style="min-width:0; flex:1;">
          <div style="font-weight:800; letter-spacing:-0.03em; font-size:1rem; color:var(--text);">Tap Escape</div>
        </div>
        <div class="multiplier-top" id="multiplierTop">x1</div>
        <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:flex-end; color:var(--muted); font-size:0.82rem; white-space:nowrap;">
          <button class="icon-btn" id="muteBtn" aria-label="Mute"><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#fff" d="M4 10v4h3.4l4.3 3.6c.67.56 1.63.08 1.63-.8V7.2c0-.88-.96-1.36-1.63-.8L7.4 10H4Z"></path><path fill="#fff" d="M16 9.2a.95.95 0 0 1 1.34.1A4.18 4.18 0 0 1 18.4 12a4.18 4.18 0 0 1-1.06 2.7.95.95 0 1 1-1.44-1.24c.39-.45.6-.94.6-1.46s-.21-1.01-.6-1.46a.95.95 0 0 1 .1-1.34Z"></path><path fill="#fff" d="M17.95 6.95a.95.95 0 0 1 1.34.03A7.24 7.24 0 0 1 21.2 12a7.24 7.24 0 0 1-1.91 5.02.95.95 0 1 1-1.37-1.3A5.35 5.35 0 0 0 19.3 12a5.35 5.35 0 0 0-1.38-3.72.95.95 0 0 1 .03-1.33Z"></path></svg></button>
          <button class="icon-btn" id="pauseBtn" aria-label="Pause"><svg viewBox="0 0 24 24" aria-hidden="true"><rect fill="#fff" x="6.5" y="5" width="3.5" height="14" rx="1.2"></rect><rect fill="#fff" x="14" y="5" width="3.5" height="14" rx="1.2"></rect></svg></button>
        </div>
      </div>
    </div>

    <div style="position:relative; margin: 0 2px 2px; height:4px; border-radius:999px; background:rgba(255,255,255,0.08); overflow:hidden;">
      <div style="position:absolute; left:25%; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.18);"></div>
      <div style="position:absolute; left:50%; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.18);"></div>
      <div style="position:absolute; left:75%; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.18);"></div>
      <div id="momentumBar" style="height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,#57f0ff,#8f7cff,#ffd86a);"></div>
    </div>

    <div class="arena-wrap" id="arenaWrap">
      <canvas id="game" width="720" height="1280"></canvas>

      <div class="arena-best">Best <strong id="gameBest">0</strong> · Max <strong>x<span id="gameMaxMultiplier">1</span></strong></div>
      <div class="tutorial-cue" id="tutorialCue"></div>
      <div class="tutorial-target" id="tutorialTarget"></div>
      <div class="resume-countdown" id="resumeCountdown"></div>

      <div class="overlay" id="overlay">
        <div class="panel" id="overlayPanel"></div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');

    function progressNeededForLevel(level) {
      const tier = Math.max(0, level - 1);
      if (tier <= 9) return 5.4 * Math.pow(1.0045, tier);
      const toX10 = 5.4 * Math.pow(1.0045, 9);
      return toX10 * Math.pow(1.0002, tier - 9);
    }

    function progressFloorForLevel(level) {
      return progressNeededForLevel(level) * 0.4;

    function difficultyProgress() {
      const tutorialDelay = tutorialActive ? 20 : 10;
      const timeT = clamp(Math.max(0, elapsed - tutorialDelay) / 30, 0, 1);
      const smoothT = timeT * timeT * (3 - 2 * timeT);
      const multBoost = clamp((displayedMultiplier - 1) * 0.014, 0, 0.09);
      return clamp(smoothT + multBoost, 0, 1);
    }

    function pointToSegmentDistance(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;
      const abLenSq = abx * abx + aby * aby || 1;
      const t = clamp((apx * abx + apy * aby) / abLenSq, 0, 1);
      const cx = ax + abx * t;
      const cy = ay + aby * t;
      return Math.hypot(px - cx, py - cy);
    }

    function ensureAudio() {
      if (audioCtx) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();

    function unlockAudio() {

    function beep(type, freq, dur, gain = 0.03) {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(80, freq * 0.82), now + dur);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(gain, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + dur + 0.02);
    }

      arenaWrap.classList.add('game-enter');

    function startGameFromHomeAnimation(homeOrb) {

      setTimeout(() => {

        playerVisible = true;

        running = true;
        overlay.classList.remove('revealing');

    function spawnObstacle(forceSide = null, aimed = false) {
      if (tutorialActive && (tutorialPhase === 'dash-threat' || tutorialPhase === 'dash-prompt') && !forceSide) return;
      const level = difficultyProgress();
      const tutorialEase = tutorialActive ? ((tutorialPhase === 'build' || tutorialPhase === 'risk') ? 0.66 : 0.74) : 1;
      const speed = (rand(162, 220) + level * 188 + Math.min(24, Math.max(0, elapsed - 58) * 0.42)) * tutorialEase;
      const size = rand(18, 34);
      const sides = ['top', 'bottom', 'left', 'right'];
      let side = forceSide || sides[Math.floor(Math.random() * sides.length)];
      let x, y, vx, vy;
      if (tutorialActive && (tutorialPhase === 'build' || tutorialPhase === 'risk')) {
        side = Math.random() < 0.5 ? 'left' : 'right';
      }
      if (side === 'top') {
        x = aimed ? player.x : rand(size, W - size); y = -60; vx = 0; vy = speed;
      } else if (side === 'bottom') {
        x = aimed ? player.x : rand(size, W - size); y = H + 60; vx = 0; vy = -speed;
      } else if (side === 'left') {
        const laneY = Math.random() < 0.5 ? H * 0.16 : H * 0.84;
        x = -60; y = (tutorialActive && (tutorialPhase === 'build' || tutorialPhase === 'risk')) ? laneY : (aimed ? player.y : rand(size, H - size)); vx = speed; vy = 0;
      } else {
        const laneY = Math.random() < 0.5 ? H * 0.16 : H * 0.84;
        x = W + 60; y = (tutorialActive && (tutorialPhase === 'build' || tutorialPhase === 'risk')) ? laneY : (aimed ? player.y : rand(size, H - size)); vx = -speed; vy = 0;
      }
      if (tutorialActive && tutorialPhase === 'risk') {
        const zones = tutorialForcedDashZones();
        const blocked = zones.some(zone => Math.abs(x - zone.x) < 170 && Math.abs(y - zone.y) < 170);
        if (blocked) return;
      }
      const palette = ['cyan', 'pink', 'violet', 'gold', 'danger'];
      obstacles.push({ x, y, vx, vy, size, born: elapsed, glow: palette[Math.floor(Math.random() * palette.length)] });
    }

    function spawnPattern() {
      const level = difficultyProgress();
      if (tutorialActive) {
        spawnObstacle();
        return;
      }
      spawnObstacle();
      if (Math.random() < 0.09 + level * 0.18) setTimeout(() => spawnObstacle(), 0);
      if (Math.random() < Math.max(0, level - 0.36) * 0.12) {
        setTimeout(() => spawnObstacle(), 0);
        setTimeout(() => spawnObstacle(), 0);
      }
    }

    function dashToward(targetX, targetY) {
      const now = performance.now();
      if (now - lastInputAt < 24) return;
      lastInputAt = now;
      if (!running) return;
      if (paused || player.cooldown > 0) return;

      const clampedX = clamp(targetX, PLAYER_R, W - PLAYER_R);
      const clampedY = clamp(targetY, PLAYER_R, H - PLAYER_R);
      const dx = clampedX - player.x;
      const dy = clampedY - player.y;
      const len = Math.hypot(dx, dy) || 1;
      const dir = { x: dx / len, y: dy / len };

      if (tutorialActive) {
        if (tutorialPhase === 'dash-prompt') {
          tutorialPhase = 'build';
          tutorialPhaseTimer = 4.8;
          tutorialDashArmed = false;
          tutorialTargetPos = null;
          tutorialTarget.classList.remove('show');
          spawnTimer = 0.8;
          aimedBallTimer = 30;
          obstacles.forEach(ob => {
            if (ob.tutorialDash) {
              ob.frozen = false;
              const speed = 210;
              ob.vx = ob.x < player.fromX ? speed : -speed;
              ob.vy = 0;
              delete ob.tutorialDash;
            }
          });
          showDashboardTutorialText('Stay still to level up', true);
        }
      }

      player.cooldown = DASH_COOLDOWN;
      player.dashT = 0;
      player.fromX = player.x;
      player.fromY = player.y;
      player.toX = clampedX;
      player.toY = clampedY;
      const levelNeed = progressNeededForLevel(displayedMultiplier);
      const chainWindow = 0.52;
      const withinChain = dashChainTimer > 0;
      dashChain = withinChain ? dashChain + 1 : 1;
      dashChainTimer = chainWindow;
      dashSpamPenalty = Math.min(1, dashSpamPenalty + 0.14 + Math.min(0.08, (dashChain - 1) * 0.03));

      let dashPenalty = 0;
      if (dashChain === 1) {
        dashPenalty = levelNeed * 0.10;
        dashBeat = 1.75;
        dashBeatMode = 1;
      } else if (dashChain === 2) {
        dashPenalty = levelNeed / 3;
        dashBeat = 2.5;
        dashBeatMode = 2;
      } else {
        dashPenalty = levelNeed;
        dashBeat = 3.4;
        dashBeatMode = 3;
      }

      multiplierProgress = Math.max(0, multiplierProgress - dashPenalty);
      if (tutorialActive && tutorialPhase === 'risk') {
        tutorialDashLessonCount += 1;
        shake = Math.max(shake, dashChain >= 2 ? 8 : 4);
        resetPop = Math.max(resetPop, dashChain >= 2 ? 0.34 : 0.12);
        tutorialTarget.classList.remove('show');
        tutorialTargetPos = null;
        tutorialForcedDashTarget = null;
        if (tutorialDashLessonCount < 3) {
          setTimeout(() => {
            if (tutorialActive && tutorialPhase === 'risk') {
              placeForcedDashTarget();
              tutorialPinnedMessage = ''; showDashboardTutorialText('You leveled up!', true);
            }
          }, 140);
        } else {
          tutorialMomentumWarned = true;
          tutorialTarget.classList.remove('show');
          tutorialTargetPos = null;
          tutorialForcedDashTarget = null;
          tutorialPhase = 'risk-release';
          tutorialPhaseTimer = 2.8;
          tutorialTimeScale = 1;
          obstacles.forEach(ob => { ob.frozen = false; });
          setTimeout(() => {
            if (tutorialActive && tutorialPhase === 'risk-release') {
              tutorialPinnedMessage = '';
              showDashboardTutorialText('Fast taps reset it to x1', true);
              playerPop = Math.max(playerPop, 1.25);
              multiplierTopPop = Math.max(multiplierTopPop, 1.1);
              resetPop = Math.max(resetPop, 1.2);
              levelFx.push({ x: player.x, y: player.y, r: 12, life: 44, age: 0, text: 'x1' });
              bgWaveFx.push({ x: player.x, y: player.y, r: 10, life: 34, age: 0, color: '#ff7a9f', level: 1 });
              resetMultiplierProgress();
              tutorialPinnedMessage = '';
              showDashboardTutorialText('Fast taps reset it to x1', true);
            }
          }, DASH_TIME * 1000 + 40);
        }
      }
      if (!(tutorialActive && tutorialPhase === 'risk-release') && (dashChain >= 3 || multiplierProgress <= 0.0001)) resetMultiplierProgress();
      momentum = Math.max(0, momentum - (dashChain >= 3 ? 10 : dashChain === 2 ? 8 : 5));
      dashSound();
      vibe(8);
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: player.x,
          y: player.y,
          vx: rand(-3.8, 3.8) - dir.x * rand(2, 4),
          vy: rand(-3.8, 3.8) - dir.y * rand(2, 4),
          size: rand(4, 9),
          life: rand(12, 22),
          age: 0,
          color: i % 2 ? '#57f0ff' : '#ff63cb'
        });
      }
    }

    function spawnConfetti(x, y) {
      const palette = ['#57f0ff', '#ff63cb', '#8f7cff', '#ffd86a', '#ffffff'];
      for (let i = 0; i < 42; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = rand(2.5, 8.5);
        confetti.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - rand(1, 3.5),
          rot: Math.random() * Math.PI * 2,
          vr: rand(-0.28, 0.28),
          size: rand(5, 11),
          life: rand(34, 60),
          age: 0,
          color: palette[Math.floor(Math.random() * palette.length)]
        });
      }
    }

    function die() {
      running = false;
      shake = 18;
      momentum = 0;
      dashSpamPenalty = 0;
      dashChain = 0;
      dashChainTimer = 0;
      dashBeat = 0;
      dashBeatMode = 0;
      resetPop = 0;
      resetMultiplierProgress(false);
      spawnConfetti(player.x, player.y);
      deathSound();
      vibe([25, 20, 25]);
      updateBest();
      showGameOver();
    }

    function update(dt) {
      if (resumePending) {
        resumeCountdownLeft = Math.max(0, resumeCountdownLeft - dt);
        const shown = Math.max(1, Math.ceil(resumeCountdownLeft));
        if (shown !== resumeCountdownShown) {
          resumeCountdownShown = shown;
          resumeCountdownPop = 1.2;
        }
        resumeCountdown.textContent = String(shown);
        resumeCountdownPop = Math.max(0, resumeCountdownPop - dt * 2.8);
        resumeCountdown.style.transform = `translateX(-50%) scale(${1 + resumeCountdownPop * 0.32})`;
        if (resumeCountdownLeft <= 0) {
          resumePending = false;
          autoPausedPendingResume = false;
          resumeSlowmo = 1;
          paused = false;
          resumeCountdown.classList.remove('show');
          resumeCountdown.style.transform = 'translateX(-50%) scale(0.82)';
          renderPauseIcon();
        }
      }
      if (!paused) {
        if (running) {
          elapsed += dt;
          if (tutorialActive) {
            tutorialPhaseTimer -= dt;
            if (tutorialPhase === 'dash-setup' && tutorialPhaseTimer <= 0) {
              spawnTutorialDashThreat();
            } else if (tutorialPhase === 'build') {
              if (!tutorialMomentumPrimed && (displayedMultiplier >= 2 || multiplierProgress >= progressNeededForLevel(1) * 0.92)) {
                tutorialMomentumPrimed = true;
                playerPop = Math.max(playerPop, 0.4);
                multiplierTopPop = Math.max(multiplierTopPop, 0.35);
              }
              if (displayedMultiplier >= 2 && multiplierProgress >= progressNeededForLevel(2) * 0.5) {
                tutorialPhase = 'risk';
                tutorialPhaseTimer = 999;
                tutorialDashLessonCount = 0;
                tutorialForcedDashTarget = null;
                tutorialX2Seen = true;
                tutorialCarryGlow = Math.max(tutorialCarryGlow, 1.7);
                tutorialTimeScale = 0;
                spawnTimer = 999;
                aimedBallTimer = 999;
                obstacles = obstacles.filter(ob => dist(ob.x, ob.y, player.x, player.y) > 220);
                obstacles.forEach(ob => {
                  ob.frozen = true;
                });
                placeForcedDashTarget();
                obstacles = obstacles.filter(ob => !tutorialTargetPos || dist(ob.x, ob.y, tutorialTargetPos.x, tutorialTargetPos.y) > 180);
                showTutorialText('Tapping fast breaks your multiplier streak');
              }
            } else if ((tutorialPhase === 'risk' || tutorialPhase === 'risk-release') && tutorialMomentumWarned && tutorialPhaseTimer <= 0) {
              finishTutorial();
            }
          }
          dashChainTimer = Math.max(0, dashChainTimer - dt);
          if (dashChainTimer <= 0) { dashChain = 0; dashBeatMode = 0; }
          dashBeat = Math.max(0, dashBeat - dt * (dashBeatMode >= 2 ? 1.55 : 1.0));
          resetPop = Math.max(0, resetPop - dt * 1.9);
          arenaFlash = Math.max(0, arenaFlash - dt * 3.2);
          if (tutorialActive && tutorialPhase === 'risk' && tutorialX2Seen) {
            tutorialX2Glow = Math.max(tutorialX2Glow, 1.6);
          } else {
            tutorialX2Glow = Math.max(0, tutorialX2Glow - dt * 1.4);
          }
          tutorialX1BreakGlow = Math.max(0, tutorialX1BreakGlow - dt * 1.2);
          if (tutorialActive && tutorialPhase === 'risk' && tutorialX2Seen) {
            tutorialCarryGlow = Math.max(tutorialCarryGlow, 1.7);
          } else {
            tutorialCarryGlow = Math.max(0, tutorialCarryGlow - dt * 0.5);
          }

          const tutorialFrozen = tutorialActive && (tutorialPhase === 'dash-prompt' || tutorialPhase === 'risk');
          if (!tutorialFrozen) {
            dashSpamPenalty = Math.max(0, dashSpamPenalty - dt * 0.55);
            momentum = clamp(momentum + dt * (7 - dashSpamPenalty * 4), 0, MOMENTUM_MAX);
          }
          const barCatchup = momentum < momentumBarVisual ? dt * 7.5 : dt * 2.4;
          momentumBarVisual += (momentum - momentumBarVisual) * Math.min(1, barCatchup);
          let multiplier = displayedMultiplier;
          if (!tutorialFrozen) {
            {
              const levelNeed = progressNeededForLevel(displayedMultiplier);
              const floorTarget = progressFloorForLevel(displayedMultiplier);
              const dashHeat = clamp(dashSpamPenalty, 0, 1);
              const movingHard = player.dashT < 1 ? 1 : 0;
              const levelPressure = Math.max(0, displayedMultiplier - 1) * 0.08;
              const controlGain = clamp(1 - dashHeat * 1.05 - movingHard * 0.78 - levelPressure * 0.24, 0, 1);
              const recoveryFillRate = 1.35;
              const scaledFillRate = Math.max(0.82, 1.35 - Math.max(0, displayedMultiplier - 1) * 0.055);
              const activeFillRate = multiplierProgress < floorTarget ? recoveryFillRate : scaledFillRate;
              const safetyFloor = displayedMultiplier > 1 ? levelSafetyBuffer(displayedMultiplier) : 0;
              const belowSafety = multiplierProgress < safetyFloor;
              const decayRate = (belowSafety ? 0.08 : 0.18) + dashHeat * 0.9 + movingHard * 0.44 + levelPressure * 0.34;
              multiplierProgress = Math.max(0, multiplierProgress + dt * activeFillRate * controlGain - dt * decayRate);

              if (multiplierProgress >= levelNeed - 0.0001) {
                const overflow = multiplierProgress - levelNeed;
                displayedMultiplier += 1;
                multiplierLevel = displayedMultiplier;
                const nextLevelNeed = progressNeededForLevel(displayedMultiplier);
                const promotionFloor = progressFloorForLevel(displayedMultiplier);
                multiplierProgress = Math.min(nextLevelNeed, Math.max(promotionFloor, levelSafetyBuffer(displayedMultiplier) + overflow));
                multiplier = displayedMultiplier;
                if (tutorialActive && displayedMultiplier >= 2 && !tutorialX2Seen) {
                  tutorialX2Seen = true;
                  tutorialX2Glow = 1.6;
                  tutorialCarryGlow = 1.6;
                  if (!tutorialX2PointerShown) {
                    tutorialX2PointerShown = true;
                  }
                  tutorialPinnedMessage = ''; showDashboardTutorialText('You leveled up!', true);
                }
                updateMaxMultiplier();
                triggerMultiplierLevel(multiplierLevel, `x${displayedMultiplier}`);
              } else {
                multiplierLevel = displayedMultiplier;
                if (multiplierProgress <= 0.0001) {
                  resetMultiplierProgress();
                }
              }
            }

            multiplier = displayedMultiplier;
            multiplierVisual += (Math.min(multiplierLevel, 3) - multiplierVisual) * Math.min(1, dt * 3.2);
            score += dt * 7 * multiplier;
            syncScore();
          } else {
            multiplier = displayedMultiplier;
          }
          const multText = `x${multiplier}`;
          multiplierTop.textContent = multText;
          multiplierTop.style.color = multiplierLevel >= 10 ? '#ffffff' : multiplierLevel >= 5 ? '#ffd86a' : multiplierLevel >= 3 ? '#ffcf7a' : multiplierLevel >= 2 ? '#ff7fe0' : '#adb8d2';
          const tutorialFocusGlow = tutorialCarryGlow > 0 ? tutorialCarryGlow : (tutorialX1BreakGlow > 0 ? tutorialX1BreakGlow : tutorialX2Glow);
          multiplierTop.style.textShadow = tutorialX1BreakGlow > 0
            ? `0 0 ${30 + tutorialFocusGlow * 24}px rgba(255,255,255,${0.46 + tutorialFocusGlow * 0.1}), 0 0 ${54 + tutorialFocusGlow * 32}px rgba(255,122,159,${0.26 + tutorialFocusGlow * 0.1}), 0 0 ${72 + tutorialFocusGlow * 40}px rgba(143,124,255,${0.14 + tutorialFocusGlow * 0.08})`
            : tutorialFocusGlow > 0
              ? `0 0 ${28 + tutorialFocusGlow * 24}px rgba(255,127,224,${0.46 + tutorialFocusGlow * 0.18}), 0 0 ${46 + tutorialFocusGlow * 38}px rgba(143,124,255,${0.28 + tutorialFocusGlow * 0.12}), 0 0 ${60 + tutorialFocusGlow * 48}px rgba(255,255,255,${0.1 + tutorialFocusGlow * 0.08})`
              : tutorialActive && displayedMultiplier >= 2
                ? '0 0 26px rgba(255,127,224,0.42), 0 0 42px rgba(143,124,255,0.26)'
                : multiplierLevel >= 10 ? '0 0 22px rgba(255,255,255,0.45)' : multiplierLevel >= 5 ? '0 0 20px rgba(255,216,106,0.34)' : multiplierLevel >= 3 ? '0 0 18px rgba(255,207,122,0.35)' : multiplierLevel >= 2 ? '0 0 18px rgba(255,127,224,0.28)' : '0 0 14px rgba(173,184,210,0.12)';
          multiplierTop.style.background = tutorialFocusGlow > 0 ? `rgba(255,255,255,${0.05 + tutorialFocusGlow * 0.1})` : 'transparent';
          multiplierTop.style.boxShadow = tutorialFocusGlow > 0 ? `0 0 ${20 + tutorialFocusGlow * 24}px rgba(${tutorialX1BreakGlow > 0 ? '255,122,159' : '255,127,224'},${0.2 + tutorialFocusGlow * 0.16})` : 'none';
          multiplierTop.style.setProperty('--tutorial-ring-border', tutorialFocusGlow > 0 ? `rgba(255,255,255,${0.4 + tutorialFocusGlow * 0.24})` : 'rgba(255,255,255,0)');
          multiplierTop.style.setProperty('--tutorial-ring-opacity', tutorialFocusGlow > 0 ? String(Math.min(1, 0.45 + tutorialFocusGlow * 0.3)) : '0');
          multiplierTop.style.setProperty('--tutorial-ring-scale', tutorialFocusGlow > 0 ? String(1 + tutorialFocusGlow * 0.18) : '0.92');
          multiplierTop.style.transform = `translate(-50%, -50%) scale(${1 + multiplierTopPop * 0.2 + tutorialFocusGlow * 0.24})`;

          const levelNeed = progressNeededForLevel(displayedMultiplier);
          const rawBarPct = Math.min(100, Math.max(0, (multiplierProgress / levelNeed) * 100));
          const currentBarPct = parseFloat(momentumBar.dataset.pct || '0');
          const easedBarPct = currentBarPct + (rawBarPct - currentBarPct) * Math.min(1, dt * (rawBarPct < currentBarPct ? 10 : 4));
          momentumBar.dataset.pct = String(easedBarPct);
          momentumBar.style.width = `${easedBarPct}%`;
          momentumBar.style.filter = tutorialActive && tutorialPhase === 'build' ? (tutorialMomentumPrimed ? 'brightness(1.42) saturate(1.46) drop-shadow(0 0 14px rgba(255,216,106,0.34))' : 'brightness(1.3) saturate(1.36) drop-shadow(0 0 10px rgba(87,240,255,0.28))') : tutorialActive && tutorialPhase === 'risk' ? 'brightness(1.14) saturate(1.08) drop-shadow(0 0 10px rgba(255,95,125,0.26))' : multiplierLevel >= 5 ? 'brightness(1.18) saturate(1.22)' : multiplierLevel >= 3 ? 'brightness(1.1)' : 'none';
          if (Math.floor(score) >= best) updateBest();

          const pressure = difficultyProgress();
          const spawnRate = Math.max(0.46, 1.05 - pressure * 0.45 - Math.min(0.1, Math.max(0, elapsed - 62) * 0.0015));
          if (startGrace > 0) startGrace -= dt;
          spawnTimer -= dt;
          aimedBallTimer -= dt;
          if (startGrace <= 0 && openingBallPending) {
            if (!tutorialActive) {
              const openingSides = ['top', 'bottom', 'left', 'right'];
              const openingSide = openingSides[Math.floor(Math.random() * openingSides.length)];
              spawnObstacle(openingSide, true);
              aimedBallTimer = extraEarlyAimedPending ? 10 : aimedIntervalForElapsed();
              spawnTimer = spawnRate;
            }
            openingBallPending = false;
          } else {
            if (startGrace <= 0 && aimedBallTimer <= 0) {
              const aimedSides = ['top', 'bottom', 'left', 'right'];
              const aimedSide = aimedSides[Math.floor(Math.random() * aimedSides.length)];
              spawnObstacle(aimedSide, true);
              if (extraEarlyAimedPending) {
                extraEarlyAimedPending = false;
                aimedBallTimer = aimedIntervalForElapsed();
              } else {
                aimedBallTimer = aimedIntervalForElapsed();
              }
            }
            if (spawnTimer <= 0 && startGrace <= 0) {
              spawnPattern();
              spawnTimer = spawnRate;
            }
          }

          if (player.cooldown > 0) player.cooldown -= dt;
          const prevX = player.x;
          const prevY = player.y;
          if (player.dashT < 1) {
            player.dashT = Math.min(1, player.dashT + dt / DASH_TIME);
            const t = 1 - Math.pow(1 - player.dashT, 3);
            player.x = lerp(player.fromX, player.toX, t);
            player.y = lerp(player.fromY, player.toY, t);
          }
          player.pulse += dt * 5;

          obstacles = obstacles.filter(ob => {
            if (!ob.frozen) {
              ob.x += ob.vx * dt;
              ob.y += ob.vy * dt;
            }
            const d = dist(player.x, player.y, ob.x, ob.y);
            const pathD = pointToSegmentDistance(ob.x, ob.y, prevX, prevY, player.x, player.y);
            const collisionRadius = ob.size + PLAYER_HIT_R;
            ob.danger = Math.min(d, pathD) < ob.size + PLAYER_R + 140;
            if (tutorialActive && ob.tutorialDash && tutorialPhase === 'dash-threat' && d < ob.size + PLAYER_R + 95) {
              tutorialPhase = 'dash-prompt';
              tutorialDashArmed = true;
              spawnTimer = 999;
              aimedBallTimer = 999;
              obstacles = obstacles.filter(item => item.tutorialDash);
              ob.vx = 0;
              ob.vy = 0;
              ob.frozen = true;
              placeTutorialTarget();
              tutorialCue.textContent = '';
              hideTutorialText();
            }
            if (startGrace <= 0 && !tutorialActive && (d < collisionRadius || pathD < collisionRadius)) die();
            return ob.x > -100 && ob.x < W + 100 && ob.y > -100 && ob.y < H + 100;
          });

        }

        particles = particles.filter(p => {
          p.age += dt * 60;
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.96;
          p.vy *= 0.96;
          return p.age < p.life;
        });

        scorePopups = scorePopups.filter(p => {
          p.age += dt * 60;
          p.y -= 1.3;
          return p.age < p.life;
        });

        confetti = confetti.filter(p => {
          p.age += dt * 60;
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.985;
          p.vy = p.vy * 0.99 + 0.14;
          p.rot += p.vr;
          return p.age < p.life;
        });

        scorePulse *= (multiplierLevel >= 3 ? 0.90 : multiplierLevel >= 2 ? 0.91 : multiplierLevel >= 1 ? 0.93 : 0.94);
        scoreGlow *= 0.92;
        scoreShimmer *= 0.9;
        multiplierTopPop *= 0.88;
        shake *= 0.88;
      }
    }

    function drawObstacle(ob) {
      const grad = ctx.createRadialGradient(ob.x, ob.y, 2, ob.x, ob.y, ob.size * 2.2);
      const style = ob.danger ? 'danger' : ob.glow;
      if (style === 'danger') {
        grad.addColorStop(0, '#fff0c4');
        grad.addColorStop(0.38, '#ff7b5f');
        grad.addColorStop(1, 'rgba(255,123,95,0.12)');
      } else if (style === 'cyan') {
        grad.addColorStop(0, '#dbfcff');
        grad.addColorStop(0.45, '#57f0ff');
        grad.addColorStop(1, 'rgba(87,240,255,0.08)');
      } else if (style === 'violet') {
        grad.addColorStop(0, '#efe9ff');
        grad.addColorStop(0.45, '#8f7cff');
        grad.addColorStop(1, 'rgba(143,124,255,0.08)');
      } else if (style === 'gold') {
        grad.addColorStop(0, '#fff6c9');
        grad.addColorStop(0.45, '#ffd86a');
        grad.addColorStop(1, 'rgba(255,216,106,0.08)');
      } else {
        grad.addColorStop(0, '#ffe0f5');
        grad.addColorStop(0.45, '#ff63cb');
        grad.addColorStop(1, 'rgba(255,99,203,0.08)');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(ob.x, ob.y, ob.size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPlayer() {
      if (!playerVisible) return;
      if (!running && confetti.length > 0) return;
      const beatFreq = dashBeatMode >= 2 ? 4.8 : 2.8;
      const beatPulse = dashBeat > 0 ? Math.max(0, Math.sin(player.pulse * beatFreq)) * 0.16 * dashBeat : 0;
      const pulse = 1 + Math.sin(player.pulse) * 0.03 + beatPulse + resetPop * 0.18;
      const levelT = multiplierVisual / 3;
      const glowBoost = 1 + playerPop * 0.35 + dashBeat * 0.26 + resetPop * 0.4;
      const coreColor = multiplierLevel >= 4 ? '#ffffff' : multiplierVisual >= 2.4 ? '#ffd86a' : multiplierVisual >= 1.2 ? '#8f7cff' : '#57f0ff';
      const outerColor = multiplierLevel >= 4 ? '#57f0ff' : multiplierVisual >= 2.4 ? '#ffb86a' : multiplierVisual >= 1.2 ? '#ff63cb' : '#a7b3cf';
      const glow = ctx.createRadialGradient(player.x - 8, player.y - 8, 4, player.x, player.y, PLAYER_R * (2.8 + levelT * 2) * glowBoost);
      glow.addColorStop(0, '#ffffff');
      glow.addColorStop(0.25, coreColor);
      glow.addColorStop(0.72, outerColor);
      glow.addColorStop(1, 'rgba(255,99,203,0.08)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(player.x, player.y, PLAYER_R * pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(player.x - 8, player.y - 8, 8, 0, Math.PI * 2);
      ctx.fill();

    }

    function drawParticles() {
      particles.forEach(p => {
        const alpha = 1 - p.age / p.life;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        ctx.globalAlpha = 1;
      });

      if (running && (multiplierVisual >= 1 || dashBeat > 0.02 || resetPop > 0.02)) {
        const alpha = 0.12 + multiplierVisual * 0.04 + dashBeat * 0.11 + resetPop * 0.16;
        const ringColor = resetPop > 0.02
          ? `rgba(255,122,159,${Math.min(0.62, alpha + 0.18)})`
          : dashBeatMode >= 3
            ? `rgba(255,99,203,${Math.min(0.54, alpha + 0.16)})`
            : dashBeatMode >= 2
              ? `rgba(255,120,160,${Math.min(0.42, alpha + 0.1)})`
              : multiplierVisual >= 2.6 ? `rgba(255,216,106,${alpha})` : multiplierVisual >= 1.6 ? `rgba(143,124,255,${alpha})` : `rgba(87,240,255,${alpha})`;
        const beatFreq = resetPop > 0.02 ? 6.4 : dashBeatMode >= 2 ? 4.9 : 2.9;
        const beatPulse = (dashBeat > 0 || resetPop > 0)
          ? Math.max(0, Math.sin(player.pulse * beatFreq)) * ((dashBeatMode >= 2 ? 7.2 : 4.2) * dashBeat + resetPop * 11)
          : 0;
        ctx.strokeStyle = ringColor;
        ctx.lineWidth = 3.5 + multiplierVisual * 2.4 + dashBeat * 2.6 + resetPop * 3.4;
        ctx.beginPath();
        ctx.arc(player.x, player.y, PLAYER_R + ctx.lineWidth * 0.5 + Math.sin(player.pulse * 1.4) * 1.2 + beatPulse, 0, Math.PI * 2);
        ctx.stroke();
      }

      levelFx = levelFx.filter(fx => {
        fx.age += 1;
        fx.r += 6.5;
        const alpha = 1 - fx.age / fx.life;
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = fx.text === 'x3' ? '#ffd86a' : fx.text === 'x2' ? '#8f7cff' : '#57f0ff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, fx.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = ctx.strokeStyle;
        ctx.font = '900 44px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(fx.text, fx.x, fx.y - fx.age * 1.2);
        ctx.globalAlpha = 1;
        return fx.age < fx.life;
      });

      scorePopups.forEach(p => {
        const alpha = 1 - p.age / p.life;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.font = '900 44px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
        ctx.globalAlpha = 1;
      });

      confetti.forEach(p => {
        const alpha = 1 - p.age / p.life;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.66);
        ctx.restore();
        ctx.globalAlpha = 1;
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const sx = shake ? rand(-shake, shake) : 0;
      const sy = shake ? rand(-shake, shake) : 0;
      ctx.save();
      ctx.translate(sx, sy);

      let bgTop = '#0a1230';
      let overlayTint = 'rgba(0,0,0,0)';
      if (multiplierLevel >= 4) {
        bgTop = '#060816';
        overlayTint = 'rgba(87,240,255,0.035)';
      } else if (multiplierLevel >= 3) {
        bgTop = '#080b1f';
        overlayTint = 'rgba(255,216,106,0.025)';
      } else if (multiplierLevel >= 2) {
        bgTop = '#091027';
        overlayTint = 'rgba(143,124,255,0.03)';
      } else if (multiplierLevel >= 1) {
        bgTop = '#0a1230';
        overlayTint = 'rgba(87,240,255,0.025)';
      }
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, bgTop);
      bg.addColorStop(1, '#050816');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      const tint = ctx.createLinearGradient(0, 0, W, H);
      tint.addColorStop(0, overlayTint);
      tint.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = tint;
      ctx.fillRect(0, 0, W, H);

      bgWaveFx = bgWaveFx.filter(fx => {
        fx.age += 1;
        fx.r += 24;
        const alpha = 1 - fx.age / fx.life;
        const fill = ctx.createRadialGradient(fx.x, fx.y, Math.max(8, fx.r * 0.06), fx.x, fx.y, fx.r);
        const strong = fx.color === '#ffd86a' ? `rgba(255,216,106,${alpha * 0.24})` : fx.color === '#8f7cff' ? `rgba(143,124,255,${alpha * 0.24})` : `rgba(87,240,255,${alpha * 0.24})`;
        const soft = fx.color === '#ffd86a' ? `rgba(255,216,106,${alpha * 0.10})` : fx.color === '#8f7cff' ? `rgba(143,124,255,${alpha * 0.10})` : `rgba(87,240,255,${alpha * 0.10})`;
        fill.addColorStop(0, strong);
        fill.addColorStop(0.62, soft);
        fill.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fill;
        ctx.fillRect(0, 0, W, H);
        return fx.age < fx.life;
      });

      if (multiplierVisual > 0.08) {
        const vignette = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.8);
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, `rgba(0,0,0,${0.08 + (multiplierVisual / 3) * 0.18})`);
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, W, H);
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let i = 1; i < 10; i++) {
        const y = (H / 10) * i;
        ctx.beginPath();
        ctx.moveTo(70, y);
        ctx.lineTo(W - 70, y);
        ctx.stroke();
      }

      const scoreBaseAlpha = multiplierLevel >= 3 ? 0.15 : multiplierLevel >= 2 ? 0.135 : multiplierLevel >= 1 ? 0.122 : 0.11;
      const scoreScale = 1 + (multiplierLevel >= 3 ? 0.1 : multiplierLevel >= 2 ? 0.08 : multiplierLevel >= 1 ? 0.05 : 0.035) * scorePulse + Math.sin(player.pulse * (multiplierLevel >= 1 ? 1.3 : 0.7)) * (multiplierLevel >= 2 ? 0.01 : 0.004);
      const scoreColor = multiplierLevel >= 3 ? '#e7d1a0' : multiplierLevel >= 2 ? '#c6b8f0' : multiplierLevel >= 1 ? '#b7d9eb' : '#a7b3c6';
      ctx.save();
      ctx.translate(W / 2, H / 2);
      ctx.scale(scoreScale, scoreScale);
      if (multiplierLevel >= 2) {
        ctx.globalAlpha = 0.04 + scoreGlow * 0.05;
        ctx.fillStyle = multiplierLevel >= 3 ? '#ffd86a' : '#8f7cff';
        ctx.font = '300 150px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(String(scoreVisual), (multiplierLevel >= 3 ? 4 : 2) * scoreShimmer, 36);
      }
      ctx.globalAlpha = scoreBaseAlpha + scoreGlow * 0.04;
      ctx.fillStyle = scoreColor;
      ctx.font = '300 150px Inter, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(String(scoreVisual), 0, 36);
      if (multiplierLevel >= 3 && scoreShimmer > 0.02) {
        ctx.globalAlpha = 0.05 * scoreShimmer;
        ctx.fillStyle = '#fff4cf';
        ctx.fillText(String(scoreVisual), -3 * scoreShimmer, 36);
      }
      ctx.restore();
      ctx.globalAlpha = 1;

      obstacles.forEach(drawObstacle);
      if (arenaFlash > 0.001) {
        const flashAlpha = arenaFlash * 0.18;
        const flashGrad = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, Math.max(W, H) * 0.9);
        flashGrad.addColorStop(0, `rgba(255,255,255,${flashAlpha})`);
        flashGrad.addColorStop(0.28, `rgba(143,124,255,${flashAlpha * 0.65})`);
        flashGrad.addColorStop(0.58, `rgba(87,240,255,${flashAlpha * 0.32})`);
        flashGrad.addColorStop(1, 'rgba(87,240,255,0)');
        ctx.fillStyle = flashGrad;
        ctx.fillRect(0, 0, W, H);
      }

      drawParticles();
      drawPlayer();

      ctx.restore();
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const rawDt = Math.min(0.032, (ts - lastTime) / 1000);
      lastTime = ts;
      if (resumeSlowmo > 0) {
        resumeSlowmo = Math.max(0, resumeSlowmo - rawDt);
      }
      const dt = rawDt * (resumeSlowmo > 0 ? 0.38 : 1);
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    arenaWrap.addEventListener('pointerdown', (e) => {
      unlockAudio();
      if (e.target && e.target.closest('button')) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      let x = (e.clientX - rect.left) * (W / rect.width);
      let y = (e.clientY - rect.top) * (H / rect.height);
      if (tutorialActive) {
        const ringPhase = tutorialPhase === 'risk' || tutorialPhase === 'dash-prompt';
        const freeTutorialPhase = tutorialPhase === 'risk-release';
        if (!ringPhase && !freeTutorialPhase) return;
        if (ringPhase) {
          if (!tutorialTargetPos) return;
          if (dist(x, y, tutorialTargetPos.x, tutorialTargetPos.y) > 82) return;
          x = tutorialTargetPos.x;
          y = tutorialTargetPos.y;
        }
      }
      dashToward(x, y);
    }, { passive: false });

    muteBtn.addEventListener('click', () => {
      unlockAudio();
      muted = !muted;
      localStorage.setItem(MUTE_KEY, muted ? '1' : '0');
      renderMuteIcon();
      if (!muted) beep('sine', 880, 0.05, 0.028);
    });

    pauseBtn.addEventListener('click', () => {
      if (!running) return;
      paused = !paused;
      renderPauseIcon();
      if (paused) showPause();
      else overlay.classList.add('hidden');
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        autoPauseGame();
      } else if (autoPausedPendingResume && running && paused && !resumePending) {
        beginResumeCountdown();
      }
    });

    window.addEventListener('blur', () => {
      autoPauseGame();
    });

    window.addEventListener('focus', () => {
      if (autoPausedPendingResume && running && paused && !resumePending) {
        beginResumeCountdown();
      }
    });

    window.addEventListener('pagehide', () => {
      autoPauseGame();
    });

    arenaWrap.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
    arenaWrap.addEventListener('dblclick', (e) => e.preventDefault(), { passive: false });


    const blockMove = (e) => {
      if (!e.target.closest('button')) e.preventDefault();
    };
    document.addEventListener('touchmove', blockMove, { passive: false });
    document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('dragstart', (e) => e.preventDefault(), { passive: false });
    window.addEventListener('touchmove', (e) => { if (!e.target.closest('button')) e.preventDefault(); }, { passive: false });
    window.addEventListener('scroll', () => window.scrollTo(0, 0), { passive: true });
    document.addEventListener('touchend', unlockAudio, { passive: true });
    document.addEventListener('pointerup', unlockAudio, { passive: true });
    best = normalizeBest(best);
    maxMultiplier = Math.max(1, normalizeBest(maxMultiplier));
    hudBest.textContent = String(best);
    gameBest.textContent = String(best);
    if (gameMaxMultiplier) gameMaxMultiplier.textContent = String(maxMultiplier);
    localStorage.setItem(BEST_KEY, String(best));
    localStorage.setItem(MAX_MULTIPLIER_KEY, String(maxMultiplier));
    renderMuteIcon();
    renderPauseIcon();
    resetGame();
    showStart();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
