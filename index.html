<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tap Escape" />
  <meta name="theme-color" content="#060816" />
  <title>Tap Escape</title>
  <style>
    :root {
      --bg: #060816;
      --bg2: #0b1430;
      --panel: rgba(10, 16, 35, 0.74);
      --line: rgba(255,255,255,0.08);
      --text: #eef5ff;
      --muted: #9ba9c8;
      --cyan: #57f0ff;
      --pink: #ff63cb;
      --violet: #8f7cff;
      --gold: #ffd86a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; min-height: 100dvh; overflow: hidden; overscroll-behavior: none; background: #060816; }
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(87,240,255,0.12), transparent 22%),
        radial-gradient(circle at bottom, rgba(10,18,40,0.35), transparent 34%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      overflow: hidden;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      -webkit-overflow-scrolling: auto;
    }

    .app {
      position: fixed;
      inset: 0;
      width: min(100%, 480px);
      height: 100dvh;
      margin: 0 auto;
      padding: calc(8px + var(--safe-top)) calc(8px + var(--safe-right)) calc(4px + var(--safe-bottom)) calc(8px + var(--safe-left));
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      background: transparent;
    }

    .card {
      background: rgba(10, 16, 35, 0.44);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
      backdrop-filter: blur(14px);
    }

    .hud {
      display: none;
    }

    .brand h1 {
      margin: 0;
      font-size: 1.28rem;
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .scores {
      text-align: right;
    }

    .scores .big {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .scores .small {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .arena-wrap {
      touch-action: none;
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.04);
      background: linear-gradient(180deg, rgba(10,18,40,0.96), rgba(5,8,18,0.96));
      flex: 1;
      min-height: 0;
      box-shadow: 0 18px 40px rgba(0,0,0,0.26);
    }

    .arena-wrap.menu-mode canvas,
    .arena-wrap.menu-mode .top-ui {
      opacity: 0;
      pointer-events: none;
    }

    .arena-wrap.game-enter {
      animation: gameReveal 520ms cubic-bezier(.2,.8,.2,1);
      transform-origin: center center;
    }

    .arena-wrap canvas,
    .arena-wrap .top-ui {
      transition: opacity 180ms ease;
    }

    canvas {
      width: 100%;
      height: auto;
      aspect-ratio: 9 / 16;
      display: block;
      touch-action: none;
    }

    .top-ui {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      pointer-events: auto;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.18);
    }

    .multiplier-top {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      min-width: 64px;
      text-align: center;
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: -0.04em;
      color: #adb8d2;
      text-shadow: 0 0 14px rgba(173,184,210,0.12);
      transition: color 180ms ease, text-shadow 180ms ease, transform 180ms ease, opacity 180ms ease;
      pointer-events: none;
    }

    .score-pill, .threat-pill {
      background: transparent;
      border: 0;
      backdrop-filter: none;
      border-radius: 0;
      padding: 0;
      pointer-events: auto;
      box-shadow: none;
    }

    .score-pill .label, .threat-pill .label {
      display: block;
      color: var(--muted);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .score-pill .value {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .score-pill .best-mini {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    .threat-pill .value {
      font-size: 0.88rem;
      font-weight: 800;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(20px + var(--safe-top)) calc(18px + var(--safe-right)) calc(24px + var(--safe-bottom)) calc(18px + var(--safe-left));
      background:
        radial-gradient(circle at top, rgba(87,240,255,0.10), transparent 24%),
        radial-gradient(circle at bottom, rgba(255,99,203,0.10), transparent 26%),
        linear-gradient(180deg, rgba(3, 6, 14, 0.99), rgba(3, 6, 14, 0.96));
      z-index: 20;
      animation: overlayFade 320ms ease;
      transition: background 180ms ease, opacity 220ms ease;
    }

    .overlay.revealing {
      background:
        radial-gradient(circle at top, rgba(87,240,255,0.02), transparent 24%),
        radial-gradient(circle at bottom, rgba(255,99,203,0.02), transparent 26%),
        linear-gradient(180deg, rgba(3, 6, 14, 0.12), rgba(3, 6, 14, 0.06));
    }

    .overlay.hidden { display: none; }

    .panel {
      width: min(90%, 360px);
      text-align: center;
      background: rgba(9, 14, 29, 0.82);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 22px;
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .panel h2 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: -0.04em;
    }

    .panel p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .big-score {
      margin-top: 10px;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.06em;
    }

    .panel-meta {
      display: flex;
      justify-content: center;
      gap: 18px;
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      flex: 1;
      min-height: 54px;
      border: 0;
      border-radius: 18px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform 120ms ease, filter 140ms ease;
    }

    .btn:active {
      transform: scale(0.97);
      filter: brightness(1.04);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--cyan), var(--pink));
      color: #08111f;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .controls, .touch-pill, .footnote {
      display: none;
    }

    .home-shell {
      width: min(100%, 420px);
      min-height: calc(100vh - var(--safe-top) - var(--safe-bottom) - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px 8px;
      text-align: center;
    }

    .home-shell.drop-all .home-title,
    .home-shell.drop-all .home-sub,
    .home-shell.drop-all .play-hero,
    .home-shell.drop-all .best-line {
      animation: homeDrop 300ms cubic-bezier(.22,.8,.3,1) forwards;
    }

    .home-title {
      font-size: clamp(2.1rem, 6vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.06em;
      margin: 0;
    }

    .home-sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
      max-width: 30ch;
    }

    .home-orb {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff 0%, #57f0ff 25%, #ff63cb 72%, rgba(255,99,203,0.08) 100%);
      box-shadow: 0 0 0 10px rgba(87,240,255,0.05), 0 0 40px rgba(143,124,255,0.22), 0 0 80px rgba(87,240,255,0.14);
      animation: orbPulse 2.4s ease-in-out infinite;
    }

    .home-orb.drop {
      animation: orbDrop 360ms cubic-bezier(.22,.78,.22,1) forwards;
      will-change: transform, opacity;
    }

    .transition-orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff 0%, #57f0ff 25%, #8f7cff 65%, rgba(255,99,203,0.15) 100%);
      box-shadow: 0 0 0 10px rgba(87,240,255,0.05), 0 0 40px rgba(143,124,255,0.22), 0 0 80px rgba(87,240,255,0.14);
      pointer-events: none;
      z-index: 40;
      will-change: transform, top, left, width, height, opacity, box-shadow, filter;
    }

    .arena-wrap.menu-mode.revealing canvas,
    .arena-wrap.menu-mode.revealing .top-ui {
      opacity: 1;
      pointer-events: none;
    }

    .play-hero {
      width: 150px;
      height: 38px;
      min-height: 0;
      padding: 0 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, #57f0ff, #8f7cff 55%, #ff63cb);
      color: #07101b;
      font-size: 0.95rem;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(87,240,255,0.14), 0 6px 14px rgba(255,99,203,0.12);
    }

    .best-line {
      color: var(--muted);
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .best-line strong {
      color: var(--text);
      font-size: 1.18em;
      font-weight: 900;
    }

    @keyframes orbPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 10px rgba(87,240,255,0.05), 0 0 40px rgba(143,124,255,0.22), 0 0 80px rgba(87,240,255,0.14); }
      50% { transform: scale(1.04); box-shadow: 0 0 0 14px rgba(87,240,255,0.06), 0 0 54px rgba(143,124,255,0.28), 0 0 96px rgba(255,99,203,0.16); }
    }

    @keyframes overlayFade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes orbDrop {
      0% { transform: translate3d(0, 0, 0) scale(1); opacity: 1; }
      12% { transform: translate3d(0, -10px, 0) scale(1.01); opacity: 1; }
      100% { transform: translate3d(0, 360px, 0) scale(0.72); opacity: 0; }
    }

    @keyframes homeDrop {
      0% { transform: translate3d(0, 0, 0); opacity: 1; }
      16% { transform: translate3d(0, -10px, 0); opacity: 1; }
      100% { transform: translate3d(0, 420px, 0); opacity: 0; }
    }

    @keyframes gameReveal {
      0% { opacity: 0; transform: scale(0.94) translateY(18px); filter: blur(8px); }
      60% { opacity: 1; transform: scale(1.01) translateY(0); filter: blur(0); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card hud">
      <div class="brand">
        <h1>Tap Escape</h1>
        <p>Dash before the walls close in.</p>
      </div>
      <div class="scores">
        <div class="big" id="hudScore">0</div>
        <div class="small">Best <span id="hudBest">0</span></div>
      </div>
    </div>

    <div class="top-ui">
      <div style="display:flex; align-items:center; gap:12px; width:100%; justify-content:space-between;">
        <div style="min-width:0; flex:1;">
          <div style="font-weight:800; letter-spacing:-0.03em; font-size:1rem; color:var(--text);">Tap Escape</div>
        </div>
        <div class="multiplier-top" id="multiplierTop" style="position:static; transform:none; min-width:auto; font-size:1.08rem;">x1</div>
        <div style="display:flex; align-items:center; gap:10px; flex:1; justify-content:flex-end; color:var(--muted); font-size:0.82rem; white-space:nowrap;">
          <span>Best <strong id="gameBest">0</strong></span>
          <button class="icon-btn" id="muteBtn" aria-label="Mute">🔊</button>
          <button class="icon-btn" id="pauseBtn" aria-label="Pause">⏸</button>
        </div>
      </div>
    </div>

    <div style="position:relative; margin: 0 2px 2px; height:4px; border-radius:999px; background:rgba(255,255,255,0.08); overflow:hidden;">
      <div style="position:absolute; left:25%; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.18);"></div>
      <div style="position:absolute; left:50%; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.18);"></div>
      <div style="position:absolute; left:75%; top:0; bottom:0; width:1px; background:rgba(255,255,255,0.18);"></div>
      <div id="momentumBar" style="height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,#57f0ff,#8f7cff,#ffd86a);"></div>
    </div>

    <div class="arena-wrap" id="arenaWrap">
      <canvas id="game" width="720" height="1280"></canvas>

      <div class="overlay" id="overlay">
        <div class="panel" id="overlayPanel"></div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayPanel = document.getElementById('overlayPanel');
    const hudScore = document.getElementById('hudScore');
    const hudBest = document.getElementById('hudBest');
    const gameScore = document.getElementById('gameScore');
    const gameBest = document.getElementById('gameBest');
    const multiplierTop = document.getElementById('multiplierTop');
    const momentumBar = document.getElementById('momentumBar');
    const muteBtn = document.getElementById('muteBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const arenaWrap = document.getElementById('arenaWrap');

    const W = canvas.width;
    const H = canvas.height;
    const CENTER = { x: W / 2, y: H / 2 };
    const PLAYER_R = 26;
    const PLAYER_HIT_R = 18;
    const DASH_DIST = 170;
    const DASH_TIME = 0.1;
    const DASH_COOLDOWN = 0.085;
    const MOMENTUM_MAX = 1000;
    const START_GRACE = 1.5;
    const BEST_KEY = 'tapEscapeBest';
    const MUTE_KEY = 'tapEscapeMute';

    let running = false;
    let paused = false;
    let score = 0;
    let best = Number(localStorage.getItem(BEST_KEY) || 0);
    let muted = localStorage.getItem(MUTE_KEY) === '1';
    let elapsed = 0;
    let lastTime = 0;
    let spawnTimer = 0;
    let milestoneStep = 10;
    let shake = 0;
    let momentum = 0;
    let momentumVisual = 0;
    let dashSpamPenalty = 0;
    let particles = [];
    let scorePopups = [];
    let confetti = [];
    let levelFx = [];
    let bgWaveFx = [];
    let obstacles = [];
    let audioCtx = null;
    let lastInputAt = 0;
    let startGrace = 0;
    let openingBallPending = false;
    let aimedBallTimer = 30;
    let multiplierLevel = 1;
    let displayedMultiplier = 1;
    let multiplierVisual = 0;
    let backgroundVisual = 0;
    let momentumBarVisual = 0;
    let playerPop = 0;
    let playerVisible = true;
    let scoreVisual = 0;
    let scorePulse = 0;
    let scoreGlow = 0;
    let scoreShimmer = 0;
    let multiplierTopPop = 0;
    let glitchTapChain = 0;
    let glitchActive = false;

    const player = {
      x: CENTER.x,
      y: CENTER.y,
      fromX: CENTER.x,
      fromY: CENTER.y,
      toX: CENTER.x,
      toY: CENTER.y,
      dashT: 1,
      cooldown: 0,
      pulse: 0
    };

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
    function rand(min, max) { return Math.random() * (max - min) + min; }

    function momentumThresholdForLevel(level) {
      if (level <= 1) return 25;
      return 25 + (level - 1) * 20;
    }

    function multiplierFromMomentum(value) {
      let level = 1;
      while (value >= momentumThresholdForLevel(level) + 0.0001) level += 1;
      return level;
    }
    function pointToSegmentDistance(px, py, ax, ay, bx, by) {
      const abx = bx - ax;
      const aby = by - ay;
      const apx = px - ax;
      const apy = py - ay;
      const abLenSq = abx * abx + aby * aby || 1;
      const t = clamp((apx * abx + apy * aby) / abLenSq, 0, 1);
      const cx = ax + abx * t;
      const cy = ay + aby * t;
      return Math.hypot(px - cx, py - cy);
    }

    function ensureAudio() {
      if (audioCtx) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
    }

    function beep(type, freq, dur, gain = 0.03) {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      osc.frequency.exponentialRampToValueAtTime(Math.max(80, freq * 0.82), now + dur);
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(gain, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + dur + 0.02);
    }

    function dashSound() { beep('triangle', 720, 0.06, 0.035); }
    function nearSound() { beep('sine', 980, 0.05, 0.02); }
    function deathSound() {
      beep('sawtooth', 220, 0.11, 0.045);
      setTimeout(() => beep('square', 150, 0.17, 0.028), 45);
    }
    function milestoneSound() {
      beep('sine', 640, 0.05, 0.024);
      setTimeout(() => beep('triangle', 860, 0.06, 0.026), 45);
    }

    function multiplierUpgradeSound(level) {
      const base = level === 1 ? 980 : level === 2 ? 1120 : 1320;
      beep('sine', base, 0.07, 0.028);
    }

    function glitchSound() {
      beep('sine', 1220, 0.07, 0.03);
      setTimeout(() => beep('triangle', 1560, 0.09, 0.03), 40);
    }

    function multiplierDownSound(level) {
      const base = level >= 5 ? 420 : level >= 3 ? 480 : 540;
      beep('sine', base, 0.06, 0.022);
    }

    function triggerMultiplierLevel(level, text) {
      const fxColor = level >= 5 ? '#ffd86a' : level >= 3 ? '#ffcf7a' : level >= 2 ? '#8f7cff' : '#57f0ff';
      playerPop = 1;
      multiplierTopPop = 1;
      scorePulse = Math.max(scorePulse, 1.2);
      scoreGlow = Math.max(scoreGlow, 0.9);
      multiplierUpgradeSound(level);
      levelFx.push({ x: player.x, y: player.y, r: 10, life: 40, age: 0, text });
      bgWaveFx.push({ x: player.x, y: player.y, r: 10, life: 40, age: 0, color: fxColor, level });
      particles.push(...Array.from({ length: 10 + Math.min(level, 6) * 4 }, (_, i) => ({
        x: player.x,
        y: player.y,
        vx: rand(-2.2, 2.2),
        vy: rand(-2.2, 2.2),
        size: rand(3, 7),
        life: rand(12, 20),
        age: 0,
        color: fxColor
      })));
    }

    function vibe(ms) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function updateBest() {
      best = Math.max(best, Math.floor(score));
      localStorage.setItem(BEST_KEY, String(best));
      hudBest.textContent = best;
      gameBest.textContent = best;
    }

    function syncScore() {
      const val = Math.floor(score);
      if (val != scoreVisual) {
        scorePulse = multiplierLevel >= 3 ? 1.35 : multiplierLevel >= 2 ? 1.12 : multiplierLevel >= 1 ? 0.9 : 0.65;
        scoreGlow = multiplierLevel >= 3 ? 1.15 : multiplierLevel >= 2 ? 0.8 : multiplierLevel >= 1 ? 0.45 : 0.18;
        scoreShimmer = multiplierLevel >= 3 ? 1 : multiplierLevel >= 2 ? 0.5 : 0;
      }
      scoreVisual = val;
      hudScore.textContent = val;
    }

    function threatLabel() {
      if (elapsed < 10) return 'Low';
      if (elapsed < 22) return 'Rising';
      if (elapsed < 38) return 'High';
      return 'Extreme';
    }

    function showStart() {
      arenaWrap.classList.add('menu-mode');
      overlay.classList.remove('hidden');
      overlayPanel.className = 'home-shell';
      overlayPanel.innerHTML = `
        <div class="home-orb" id="homeOrb" aria-hidden="true"></div>
        <h2 class="home-title">Tap Escape</h2>
        <div class="best-line">Best score: <strong>${best}</strong></div>
        <button class="btn play-hero" id="playBtn">Play</button>
      `;
      document.getElementById('playBtn').onclick = () => {
        overlay.classList.add('revealing');
        overlayPanel.classList.add('drop-all');
        const orb = document.getElementById('homeOrb');
        startGameFromHomeAnimation(orb);
      };
    }

    function showPause() {
      overlay.classList.remove('hidden');
      overlayPanel.className = 'panel';
      overlayPanel.innerHTML = `
        <h2>Paused</h2>
        <p>Resume whenever you’re ready.</p>
        <div class="row">
          <button class="btn btn-primary" id="resumeBtn">Resume</button>
          <button class="btn btn-secondary" id="homeBtn">Home</button>
        </div>
      `;
      document.getElementById('resumeBtn').onclick = () => { paused = false; overlay.classList.add('hidden'); };
      document.getElementById('homeBtn').onclick = () => { running = false; paused = false; resetGame(); showStart(); };
    }

    function showGameOver() {
      overlay.classList.remove('hidden');
      overlayPanel.className = 'panel';
      overlayPanel.innerHTML = `
        <h2>Game Over</h2>
        <div class="big-score">${Math.floor(score)}</div>
        <p>One hit. That’s it. Go again.</p>
        <div class="panel-meta"><span>Best ${best}</span></div>
        <div class="row">
          <button class="btn btn-primary" id="restartBtn">Restart</button>
          <button class="btn btn-secondary" id="menuBtn">Menu</button>
        </div>
      `;
      document.getElementById('restartBtn').onclick = startGame;
      document.getElementById('menuBtn').onclick = () => { resetGame(); showStart(); };
    }

    function resetGame() {
      score = 0;
      elapsed = 0;
      spawnTimer = 0;
      shake = 0;
      momentum = 0;
      momentumVisual = 0;
      dashSpamPenalty = 0;
      obstacles = [];
      particles = [];
      scorePopups = [];
      confetti = [];
      levelFx = [];
      bgWaveFx = [];
      multiplierLevel = 0;
      multiplierVisual = 0;
      backgroundVisual = 0;
      momentumBarVisual = 0;
      playerPop = 0;
      playerVisible = true;
      scoreVisual = 0;
      scorePulse = 0;
      scoreGlow = 0;
      scoreShimmer = 0;
      multiplierTopPop = 0;
      glitchTapChain = 0;
      glitchActive = false;
      openingBallPending = true;
      aimedBallTimer = 30;
      nearMissMemory = new WeakSet();
      player.x = CENTER.x;
      player.y = CENTER.y;
      player.fromX = CENTER.x;
      player.fromY = CENTER.y;
      player.toX = CENTER.x;
      player.toY = CENTER.y;
      player.dashT = 1;
      player.cooldown = 0;
      syncScore();
      updateBest();
      pauseBtn.textContent = '⏸';
      startGrace = START_GRACE;
    }

    function startGame() {
      ensureAudio();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      resetGame();
      running = true;
      paused = false;
      arenaWrap.classList.remove('menu-mode');
      arenaWrap.classList.remove('game-enter');
      void arenaWrap.offsetWidth;
      arenaWrap.classList.add('game-enter');
      setTimeout(() => arenaWrap.classList.remove('game-enter'), 560);
      overlay.classList.add('hidden');
    }

    function startGameFromHomeAnimation(homeOrb) {
      ensureAudio();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      resetGame();
      playerVisible = false;
      arenaWrap.classList.add('revealing');
      arenaWrap.classList.remove('menu-mode');
      running = false;
      paused = false;

      const canvasRect = canvas.getBoundingClientRect();
      const targetSize = (PLAYER_R * 2) * (canvasRect.width / W);
      const targetLeft = canvasRect.left + (canvasRect.width / 2) - targetSize / 2;
      const targetTop = canvasRect.top + (canvasRect.height / 2) - targetSize / 2;

      if (!homeOrb) {
        running = true;
        overlay.classList.add('hidden');
        return;
      }

      const startRect = homeOrb.getBoundingClientRect();
      const flyingOrb = document.createElement('div');
      flyingOrb.className = 'transition-orb';
      flyingOrb.style.left = `${startRect.left}px`;
      flyingOrb.style.top = `${startRect.top}px`;
      flyingOrb.style.width = `${startRect.width}px`;
      flyingOrb.style.height = `${startRect.height}px`;
      document.body.appendChild(flyingOrb);
      homeOrb.style.opacity = '0';

      flyingOrb.style.background = 'radial-gradient(circle at 35% 35%, rgba(255,255,255,1) 0%, rgba(87,240,255,1) 32%, rgba(143,124,255,1) 72%, rgba(255,99,203,0.02) 100%)';
      requestAnimationFrame(() => {
        flyingOrb.style.transition = 'left 520ms cubic-bezier(.2,.8,.22,1), top 520ms cubic-bezier(.2,.8,.22,1), width 520ms cubic-bezier(.2,.8,.22,1), height 520ms cubic-bezier(.2,.8,.22,1), opacity 520ms ease, filter 520ms ease, box-shadow 520ms ease';
        flyingOrb.style.left = `${targetLeft}px`;
        flyingOrb.style.top = `${targetTop}px`;
        flyingOrb.style.width = `${targetSize}px`;
        flyingOrb.style.height = `${targetSize}px`;
        flyingOrb.style.filter = 'brightness(0.99)';
        flyingOrb.style.boxShadow = '0 0 0 0 rgba(87,240,255,0), 0 0 22px rgba(143,124,255,0.18), 0 0 36px rgba(87,240,255,0.10)';
      });

      setTimeout(() => {
        flyingOrb.remove();
        playerVisible = true;
        arenaWrap.classList.remove('revealing');
        running = true;
        overlay.classList.remove('revealing');
        overlay.classList.add('hidden');
      }, 530);
    }

    function spawnObstacle(forceSide = null, aimed = false) {
      const level = clamp(elapsed / 35, 0, 1);
      const speed = rand(200, 270) + level * 240;
      const size = rand(18, 34);
      const sides = ['top', 'bottom', 'left', 'right'];
      const side = forceSide || sides[Math.floor(Math.random() * sides.length)];
      let x, y, vx, vy;
      if (side === 'top') {
        x = aimed ? player.x : rand(90, W - 90); y = -60; vx = 0; vy = speed;
      } else if (side === 'bottom') {
        x = aimed ? player.x : rand(90, W - 90); y = H + 60; vx = 0; vy = -speed;
      } else if (side === 'left') {
        x = -60; y = aimed ? player.y : rand(180, H - 180); vx = speed; vy = 0;
      } else {
        x = W + 60; y = aimed ? player.y : rand(180, H - 180); vx = -speed; vy = 0;
      }
      const palette = ['cyan', 'pink', 'violet', 'gold', 'danger'];
      obstacles.push({ x, y, vx, vy, size, born: elapsed, glow: palette[Math.floor(Math.random() * palette.length)] });
    }

    function spawnPattern() {
      const level = clamp(elapsed / 30, 0, 1);
      spawnObstacle();
      if (Math.random() < 0.22 + level * 0.2) setTimeout(() => spawnObstacle(), 0);
      if (Math.random() < 0.08 + level * 0.18) {
        setTimeout(() => spawnObstacle(), 0);
        setTimeout(() => spawnObstacle(), 0);
      }
    }

    function dashToward(targetX, targetY) {
      const now = performance.now();
      if (now - lastInputAt < 24) return;
      lastInputAt = now;
      if (!running) return;
      if (paused || player.cooldown > 0) return;

      const clampedX = clamp(targetX, PLAYER_R, W - PLAYER_R);
      const clampedY = clamp(targetY, PLAYER_R, H - PLAYER_R);
      const dx = clampedX - player.x;
      const dy = clampedY - player.y;
      const len = Math.hypot(dx, dy) || 1;
      const dir = { x: dx / len, y: dy / len };

      player.cooldown = DASH_COOLDOWN;
      player.dashT = 0;
      player.fromX = player.x;
      player.fromY = player.y;
      player.toX = clampedX;
      player.toY = clampedY;
      dashSpamPenalty = Math.min(1, dashSpamPenalty + 0.12);
      momentum = Math.max(0, momentum - 5);
      dashSound();
      vibe(8);
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: player.x,
          y: player.y,
          vx: rand(-3.8, 3.8) - dir.x * rand(2, 4),
          vy: rand(-3.8, 3.8) - dir.y * rand(2, 4),
          size: rand(4, 9),
          life: rand(12, 22),
          age: 0,
          color: i % 2 ? '#57f0ff' : '#ff63cb'
        });
      }
    }

    function spawnConfetti(x, y) {
      const palette = ['#57f0ff', '#ff63cb', '#8f7cff', '#ffd86a', '#ffffff'];
      for (let i = 0; i < 42; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = rand(2.5, 8.5);
        confetti.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - rand(1, 3.5),
          rot: Math.random() * Math.PI * 2,
          vr: rand(-0.28, 0.28),
          size: rand(5, 11),
          life: rand(34, 60),
          age: 0,
          color: palette[Math.floor(Math.random() * palette.length)]
        });
      }
    }

    function die() {
      running = false;
      shake = 18;
      momentum = 0;
      dashSpamPenalty = 0;
      displayedMultiplier = 1;
      multiplierLevel = 1;
      multiplierVisual = 0;
      momentumBarVisual = 0;
      if (typeof multiplierTop !== 'undefined' && multiplierTop) multiplierTop.textContent = 'x1';
      if (typeof momentumBar !== 'undefined' && momentumBar) {
        momentumBar.style.width = '0%';
        momentumBar.dataset.pct = '0';
      }
      spawnConfetti(player.x, player.y);
      deathSound();
      vibe([25, 20, 25]);
      updateBest();
      showGameOver();
    }

    function update(dt) {
      if (!paused) {
        if (running) {
          elapsed += dt;
          dashSpamPenalty = Math.max(0, dashSpamPenalty - dt * 0.45);
          momentum = clamp(momentum + dt * (10 - dashSpamPenalty * 8), 0, MOMENTUM_MAX);
          const barCatchup = momentum < momentumBarVisual ? dt * 9.5 : dt * 2.6;
          momentumBarVisual += (momentum - momentumBarVisual) * Math.min(1, barCatchup);
          let multiplier = glitchActive ? 10 : displayedMultiplier;
          if (glitchActive) {
            if (displayedMultiplier < 10) {
              displayedMultiplier = 10;
              playerPop = 1;
              multiplierTopPop = 1;
              scorePulse = Math.max(scorePulse, 1.4);
              scoreGlow = Math.max(scoreGlow, 1.1);
              glitchSound();
            }
            multiplierLevel = 10;
          } else {
            const nextThreshold = momentumThresholdForLevel(displayedMultiplier);
            if (momentum >= nextThreshold) {
              displayedMultiplier += 1;
              multiplier = displayedMultiplier;
              multiplierLevel = displayedMultiplier;
              triggerMultiplierLevel(multiplierLevel, `x${displayedMultiplier}`);
            } else {
              multiplierLevel = displayedMultiplier;
            }
          }
          multiplier = glitchActive ? 10 : displayedMultiplier;
          multiplierVisual += (Math.min(multiplierLevel, 3) - multiplierVisual) * Math.min(1, dt * 3.2);
          score += dt * 7 * multiplier;
          syncScore();
          const multText = `x${multiplier}`;
          multiplierTop.textContent = multText;
          multiplierTop.style.color = multiplierLevel >= 10 ? '#ffffff' : multiplierLevel >= 5 ? '#ffd86a' : multiplierLevel >= 3 ? '#ffcf7a' : multiplierLevel >= 2 ? '#ff7fe0' : '#adb8d2';
          multiplierTop.style.textShadow = multiplierLevel >= 10 ? '0 0 22px rgba(255,255,255,0.45)' : multiplierLevel >= 5 ? '0 0 20px rgba(255,216,106,0.34)' : multiplierLevel >= 3 ? '0 0 18px rgba(255,207,122,0.35)' : multiplierLevel >= 2 ? '0 0 18px rgba(255,127,224,0.28)' : '0 0 14px rgba(173,184,210,0.12)';
          multiplierTop.style.transform = `translateX(-50%) scale(${1 + multiplierTopPop * 0.2})`;
          let currentLevelBase = displayedMultiplier <= 1 ? 0 : momentumThresholdForLevel(displayedMultiplier - 1);
          let nextLevelThreshold = momentumThresholdForLevel(displayedMultiplier);
          let levelSpan = Math.max(1, nextLevelThreshold - currentLevelBase);
          let rawBarPct = Math.min(100, Math.max(0, ((momentum - currentLevelBase) / levelSpan) * 100));

          if (!glitchActive && displayedMultiplier > 1 && momentum <= currentLevelBase) {
            displayedMultiplier = 1;
            multiplierLevel = 1;
            multiplierTopPop = 0.7;
            multiplierDownSound(1);
            momentum = 0;
            momentumBarVisual = 0;
            currentLevelBase = 0;
            nextLevelThreshold = momentumThresholdForLevel(displayedMultiplier);
            levelSpan = Math.max(1, nextLevelThreshold - currentLevelBase);
            rawBarPct = 0;
          }

          const currentBarPct = parseFloat(momentumBar.dataset.pct || '0');
          const easedBarPct = currentBarPct + (rawBarPct - currentBarPct) * Math.min(1, dt * (rawBarPct < currentBarPct ? 10 : 4));
          momentumBar.dataset.pct = String(easedBarPct);
          momentumBar.style.width = `${easedBarPct}%`;
          momentumBar.style.filter = momentum >= 75 ? 'brightness(1.2) saturate(1.2)' : momentum >= 50 ? 'brightness(1.1)' : 'none';
          if (Math.floor(score) >= best) updateBest();

          const spawnRate = Math.max(0.28, 0.85 - elapsed * 0.012);
          if (startGrace > 0) startGrace -= dt;
          spawnTimer -= dt;
          aimedBallTimer -= dt;
          if (startGrace <= 0 && openingBallPending) {
            const openingSides = ['top', 'bottom', 'left', 'right'];
            const openingSide = openingSides[Math.floor(Math.random() * openingSides.length)];
            spawnObstacle(openingSide, true);
            openingBallPending = false;
            aimedBallTimer = 30;
            spawnTimer = spawnRate;
          } else {
            if (startGrace <= 0 && aimedBallTimer <= 0) {
              const aimedSides = ['top', 'bottom', 'left', 'right'];
              const aimedSide = aimedSides[Math.floor(Math.random() * aimedSides.length)];
              spawnObstacle(aimedSide, true);
              aimedBallTimer = 30;
            }
            if (spawnTimer <= 0 && startGrace <= 0) {
              spawnPattern();
              spawnTimer = spawnRate;
            }
          }

          if (player.cooldown > 0) player.cooldown -= dt;
          const prevX = player.x;
          const prevY = player.y;
          if (player.dashT < 1) {
            player.dashT = Math.min(1, player.dashT + dt / DASH_TIME);
            const t = 1 - Math.pow(1 - player.dashT, 3);
            player.x = lerp(player.fromX, player.toX, t);
            player.y = lerp(player.fromY, player.toY, t);
          }
          player.pulse += dt * 5;

          obstacles = obstacles.filter(ob => {
            ob.x += ob.vx * dt;
            ob.y += ob.vy * dt;
            const d = dist(player.x, player.y, ob.x, ob.y);
            const pathD = pointToSegmentDistance(ob.x, ob.y, prevX, prevY, player.x, player.y);
            const collisionRadius = ob.size + PLAYER_HIT_R;
            ob.danger = Math.min(d, pathD) < ob.size + PLAYER_R + 140;
            if (startGrace <= 0 && (d < collisionRadius || pathD < collisionRadius)) die();
            return ob.x > -100 && ob.x < W + 100 && ob.y > -100 && ob.y < H + 100;
          });

        }

        particles = particles.filter(p => {
          p.age += dt * 60;
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.96;
          p.vy *= 0.96;
          return p.age < p.life;
        });

        scorePopups = scorePopups.filter(p => {
          p.age += dt * 60;
          p.y -= 1.3;
          return p.age < p.life;
        });

        confetti = confetti.filter(p => {
          p.age += dt * 60;
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.985;
          p.vy = p.vy * 0.99 + 0.14;
          p.rot += p.vr;
          return p.age < p.life;
        });

        scorePulse *= (multiplierLevel >= 3 ? 0.90 : multiplierLevel >= 2 ? 0.91 : multiplierLevel >= 1 ? 0.93 : 0.94);
        scoreGlow *= 0.92;
        scoreShimmer *= 0.9;
        multiplierTopPop *= 0.88;
        shake *= 0.88;
      }
    }

    function drawObstacle(ob) {
      const grad = ctx.createRadialGradient(ob.x, ob.y, 2, ob.x, ob.y, ob.size * 2.2);
      const style = ob.danger ? 'danger' : ob.glow;
      if (style === 'danger') {
        grad.addColorStop(0, '#fff0c4');
        grad.addColorStop(0.38, '#ff7b5f');
        grad.addColorStop(1, 'rgba(255,123,95,0.12)');
      } else if (style === 'cyan') {
        grad.addColorStop(0, '#dbfcff');
        grad.addColorStop(0.45, '#57f0ff');
        grad.addColorStop(1, 'rgba(87,240,255,0.08)');
      } else if (style === 'violet') {
        grad.addColorStop(0, '#efe9ff');
        grad.addColorStop(0.45, '#8f7cff');
        grad.addColorStop(1, 'rgba(143,124,255,0.08)');
      } else if (style === 'gold') {
        grad.addColorStop(0, '#fff6c9');
        grad.addColorStop(0.45, '#ffd86a');
        grad.addColorStop(1, 'rgba(255,216,106,0.08)');
      } else {
        grad.addColorStop(0, '#ffe0f5');
        grad.addColorStop(0.45, '#ff63cb');
        grad.addColorStop(1, 'rgba(255,99,203,0.08)');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(ob.x, ob.y, ob.size, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPlayer() {
      if (!playerVisible) return;
      if (!running && confetti.length > 0) return;
      const pulse = 1 + Math.sin(player.pulse) * 0.03;
      const levelT = multiplierVisual / 3;
      const glowBoost = 1 + playerPop * 0.35;
      const coreColor = multiplierLevel >= 4 ? '#ffffff' : multiplierVisual >= 2.4 ? '#ffd86a' : multiplierVisual >= 1.2 ? '#8f7cff' : '#57f0ff';
      const outerColor = multiplierLevel >= 4 ? '#57f0ff' : multiplierVisual >= 2.4 ? '#ffb86a' : multiplierVisual >= 1.2 ? '#ff63cb' : '#a7b3cf';
      const glow = ctx.createRadialGradient(player.x - 8, player.y - 8, 4, player.x, player.y, PLAYER_R * (2.8 + levelT * 2) * glowBoost);
      glow.addColorStop(0, '#ffffff');
      glow.addColorStop(0.25, coreColor);
      glow.addColorStop(0.72, outerColor);
      glow.addColorStop(1, 'rgba(255,99,203,0.08)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(player.x, player.y, PLAYER_R * pulse, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.beginPath();
      ctx.arc(player.x - 8, player.y - 8, 8, 0, Math.PI * 2);
      ctx.fill();

    }

    function drawParticles() {
      particles.forEach(p => {
        const alpha = 1 - p.age / p.life;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        ctx.globalAlpha = 1;
      });

      if (running && multiplierVisual >= 1) {
        const alpha = 0.08 + multiplierVisual * 0.04;
        const ringColor = multiplierVisual >= 2.6 ? `rgba(255,216,106,${alpha})` : multiplierVisual >= 1.6 ? `rgba(143,124,255,${alpha})` : `rgba(87,240,255,${alpha})`;
        ctx.strokeStyle = ringColor;
        ctx.lineWidth = 3 + multiplierVisual * 2.2;
        ctx.beginPath();
        ctx.arc(player.x, player.y, PLAYER_R + ctx.lineWidth * 0.5 + Math.sin(player.pulse * 1.4) * 1.2, 0, Math.PI * 2);
        ctx.stroke();
      }

      levelFx = levelFx.filter(fx => {
        fx.age += 1;
        fx.r += 6.5;
        const alpha = 1 - fx.age / fx.life;
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = fx.text === 'x3' ? '#ffd86a' : fx.text === 'x2' ? '#8f7cff' : '#57f0ff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(fx.x, fx.y, fx.r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = ctx.strokeStyle;
        ctx.font = '900 44px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(fx.text, fx.x, fx.y - fx.age * 1.2);
        ctx.globalAlpha = 1;
        return fx.age < fx.life;
      });

      scorePopups.forEach(p => {
        const alpha = 1 - p.age / p.life;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.font = '900 44px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(p.text, p.x, p.y);
        ctx.globalAlpha = 1;
      });

      confetti.forEach(p => {
        const alpha = 1 - p.age / p.life;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 3, p.size, p.size * 0.66);
        ctx.restore();
        ctx.globalAlpha = 1;
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      const sx = shake ? rand(-shake, shake) : 0;
      const sy = shake ? rand(-shake, shake) : 0;
      ctx.save();
      ctx.translate(sx, sy);

      let bgTop = '#0a1230';
      let overlayTint = 'rgba(0,0,0,0)';
      if (multiplierLevel >= 4) {
        bgTop = '#060816';
        overlayTint = 'rgba(87,240,255,0.035)';
      } else if (multiplierLevel >= 3) {
        bgTop = '#080b1f';
        overlayTint = 'rgba(255,216,106,0.025)';
      } else if (multiplierLevel >= 2) {
        bgTop = '#091027';
        overlayTint = 'rgba(143,124,255,0.03)';
      } else if (multiplierLevel >= 1) {
        bgTop = '#0a1230';
        overlayTint = 'rgba(87,240,255,0.025)';
      }
      const bg = ctx.createLinearGradient(0, 0, 0, H);
      bg.addColorStop(0, bgTop);
      bg.addColorStop(1, '#050816');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      const tint = ctx.createLinearGradient(0, 0, W, H);
      tint.addColorStop(0, overlayTint);
      tint.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = tint;
      ctx.fillRect(0, 0, W, H);

      bgWaveFx = bgWaveFx.filter(fx => {
        fx.age += 1;
        fx.r += 24;
        const alpha = 1 - fx.age / fx.life;
        const fill = ctx.createRadialGradient(fx.x, fx.y, Math.max(8, fx.r * 0.06), fx.x, fx.y, fx.r);
        const strong = fx.color === '#ffd86a' ? `rgba(255,216,106,${alpha * 0.24})` : fx.color === '#8f7cff' ? `rgba(143,124,255,${alpha * 0.24})` : `rgba(87,240,255,${alpha * 0.24})`;
        const soft = fx.color === '#ffd86a' ? `rgba(255,216,106,${alpha * 0.10})` : fx.color === '#8f7cff' ? `rgba(143,124,255,${alpha * 0.10})` : `rgba(87,240,255,${alpha * 0.10})`;
        fill.addColorStop(0, strong);
        fill.addColorStop(0.62, soft);
        fill.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fill;
        ctx.fillRect(0, 0, W, H);
        return fx.age < fx.life;
      });

      if (multiplierVisual > 0.08) {
        const vignette = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.8);
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, `rgba(0,0,0,${0.08 + (multiplierVisual / 3) * 0.18})`);
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, W, H);
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let i = 1; i < 10; i++) {
        const y = (H / 10) * i;
        ctx.beginPath();
        ctx.moveTo(70, y);
        ctx.lineTo(W - 70, y);
        ctx.stroke();
      }

      const scoreBaseAlpha = multiplierLevel >= 3 ? 0.15 : multiplierLevel >= 2 ? 0.135 : multiplierLevel >= 1 ? 0.122 : 0.11;
      const scoreScale = 1 + (multiplierLevel >= 3 ? 0.1 : multiplierLevel >= 2 ? 0.08 : multiplierLevel >= 1 ? 0.05 : 0.035) * scorePulse + Math.sin(player.pulse * (multiplierLevel >= 1 ? 1.3 : 0.7)) * (multiplierLevel >= 2 ? 0.01 : 0.004);
      const scoreColor = multiplierLevel >= 3 ? '#e7d1a0' : multiplierLevel >= 2 ? '#c6b8f0' : multiplierLevel >= 1 ? '#b7d9eb' : '#a7b3c6';
      ctx.save();
      ctx.translate(W / 2, H / 2);
      ctx.scale(scoreScale, scoreScale);
      if (multiplierLevel >= 2) {
        ctx.globalAlpha = 0.04 + scoreGlow * 0.05;
        ctx.fillStyle = multiplierLevel >= 3 ? '#ffd86a' : '#8f7cff';
        ctx.font = '300 150px Inter, system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(String(scoreVisual), (multiplierLevel >= 3 ? 4 : 2) * scoreShimmer, 36);
      }
      ctx.globalAlpha = scoreBaseAlpha + scoreGlow * 0.04;
      ctx.fillStyle = scoreColor;
      ctx.font = '300 150px Inter, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(String(scoreVisual), 0, 36);
      if (multiplierLevel >= 3 && scoreShimmer > 0.02) {
        ctx.globalAlpha = 0.05 * scoreShimmer;
        ctx.fillStyle = '#fff4cf';
        ctx.fillText(String(scoreVisual), -3 * scoreShimmer, 36);
      }
      ctx.restore();
      ctx.globalAlpha = 1;

      obstacles.forEach(drawObstacle);
      drawParticles();
      drawPlayer();

      ctx.restore();
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = Math.min(0.032, (ts - lastTime) / 1000);
      lastTime = ts;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    arenaWrap.addEventListener('pointerdown', (e) => {
      if (e.target && e.target.closest('button')) return;
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (W / rect.width);
      const y = (e.clientY - rect.top) * (H / rect.height);
      const tappedPlayer = dist(x, y, player.x, player.y) <= PLAYER_R + 16;
      if (running && tappedPlayer) {
        glitchTapChain += 1;
        if (glitchTapChain >= 10 && !glitchActive) {
          glitchActive = true;
          multiplierLevel = Math.max(multiplierLevel, 4);
        }
      } else {
        glitchTapChain = 0;
      }
      dashToward(x, y);
    }, { passive: false });

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      localStorage.setItem(MUTE_KEY, muted ? '1' : '0');
      muteBtn.textContent = muted ? '🔇' : '🔊';
    });

    pauseBtn.addEventListener('click', () => {
      if (!running) return;
      paused = !paused;
      pauseBtn.textContent = paused ? '▶' : '⏸';
      if (paused) showPause();
      else overlay.classList.add('hidden');
    });

    arenaWrap.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
    arenaWrap.addEventListener('dblclick', (e) => e.preventDefault(), { passive: false });


    const blockMove = (e) => {
      if (!e.target.closest('button')) e.preventDefault();
    };
    document.addEventListener('touchmove', blockMove, { passive: false });
    document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('dragstart', (e) => e.preventDefault(), { passive: false });
    window.addEventListener('touchmove', (e) => { if (!e.target.closest('button')) e.preventDefault(); }, { passive: false });
    window.addEventListener('scroll', () => window.scrollTo(0, 0), { passive: true });
    hudBest.textContent = best;
    gameBest.textContent = best;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    resetGame();
    showStart();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
